<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🤖 AI Code Reviewer</title>
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px 40px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    header h1 { font-size: 1.8rem; color: #a78bfa; }
    header p  { font-size: 0.9rem; color: #888; margin-top: 2px; }

    .badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-left: auto;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 30px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }

    .panel {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      background: #16213e;
      padding: 14px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #a78bfa;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls {
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #1e1e3a;
    }

    select, input {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
    }

    select:focus, input:focus {
      border-color: #a78bfa;
    }

    textarea {
      width: 100%;
      background: #0d0d1a;
      border: none;
      color: #e0e0e0;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: none;
      height: 420px;
      outline: none;
    }

    textarea::placeholder { color: #444; }

    .btn-review {
      padding: 10px 28px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
    }

    .btn-review:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(167,139,250,0.4); }
    .btn-review:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-clear {
      padding: 10px 18px;
      background: transparent;
      color: #888;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear:hover { border-color: #a78bfa; color: #a78bfa; }

    .result-area {
      padding: 20px;
      height: 490px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .result-area::-webkit-scrollbar { width: 6px; }
    .result-area::-webkit-scrollbar-track { background: #1a1a2e; }
    .result-area::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

    .placeholder-msg {
      color: #444;
      text-align: center;
      margin-top: 80px;
      font-size: 1rem;
    }

    .placeholder-msg span { font-size: 3rem; display: block; margin-bottom: 10px; }

    .loading {
      text-align: center;
      margin-top: 80px;
      color: #a78bfa;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-content h2 { color: #a78bfa; margin: 18px 0 8px; font-size: 1rem; }
    .result-content h3 { color: #818cf8; margin: 14px 0 6px; }
    .result-content p  { margin-bottom: 10px; color: #cbd5e1; }
    .result-content ul { padding-left: 20px; margin-bottom: 10px; }
    .result-content li { margin-bottom: 6px; color: #cbd5e1; }
    .result-content pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .result-content code { font-family: 'Courier New', monospace; font-size: 0.85rem; }
    .result-content strong { color: #f1f5f9; }

    .error-msg {
      background: #2d1515;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 15px;
      color: #fca5a5;
      margin-top: 20px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a2e;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🤖 AI Code Reviewer</h1>
    <p>Powered by LLaMA 3 (Groq) + LangChain + FastAPI</p>
  </div>
  <span class="badge">⚡ Free & Fast</span>
</header>

<div class="container">

  <!-- INPUT PANEL -->
  <div class="panel">
    <div class="panel-header">📝 Your Code</div>
    <div class="controls">
      <label style="color:#888; font-size:0.85rem;">Language:</label>
      <select id="language">
        <option value="python">🐍 Python</option>
        <option value="javascript">🟨 JavaScript</option>
        <option value="typescript">🔷 TypeScript</option>
        <option value="java">☕ Java</option>
        <option value="cpp">⚙️ C++</option>
        <option value="c">🔵 C</option>
        <option value="go">🐹 Go</option>
        <option value="rust">🦀 Rust</option>
        <option value="php">🐘 PHP</option>
        <option value="ruby">💎 Ruby</option>
        <option value="sql">🗃️ SQL</option>
        <option value="bash">🐚 Bash</option>
      </select>
      <input id="context" type="text" placeholder="Context (optional)..." style="flex:1; min-width:150px;"/>
    </div>
    <textarea id="codeInput" placeholder="// Paste your code here and click Review Code...

def example():
    password = '12345'  # bad practice
    user_input = input('Enter: ')
    eval(user_input)    # dangerous!
    return password
"></textarea>
    <div class="controls" style="border-top: 1px solid #1e1e3a; border-bottom: none;">
      <button class="btn-clear" onclick="clearAll()">🗑️ Clear</button>
      <button class="btn-clear" onclick="loadSample()">📂 Load Sample</button>
      <button class="btn-review" id="reviewBtn" onclick="reviewCode()">🔍 Review Code</button>
    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel">
    <div class="panel-header">📋 AI Review Results</div>
    <div class="result-area" id="resultArea">
      <div class="placeholder-msg">
        <span>🔍</span>
        Paste your code and click <strong style="color:#a78bfa;">Review Code</strong> to get started.
      </div>
    </div>
  </div>

</div>

<div class="footer">
  Built with ❤️ using FastAPI + LangChain + Groq (LLaMA 3) | Completely Free
</div>

<script>
const API_URL = "http://127.0.0.1:9001";
  async function reviewCode() {
    const code = document.getElementById("codeInput").value.trim();
    const language = document.getElementById("language").value;
    const context = document.getElementById("context").value.trim() || "None";
    const btn = document.getElementById("reviewBtn");
    const resultArea = document.getElementById("resultArea");

    if (!code) {
      resultArea.innerHTML = `<div class="error-msg">⚠️ Please paste some code before reviewing!</div>`;
      return;
    }

    btn.disabled = true;
    btn.textContent = "⏳ Reviewing...";
    resultArea.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>🤖 AI is reviewing your code...</p>
        <p style="font-size:0.8rem; color:#555; margin-top:8px;">This may take 5–15 seconds</p>
      </div>`;

    try {
      const response = await fetch(`${API_URL}/review`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
  content: code,
  review_type: "code"
})
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.detail || "Server error");
      }

      // Render markdown
      let review = data.review;

// If backend sends JSON as string → parse it
if (typeof review === "string") {
  try {
    review = JSON.parse(review);
  } catch {
    // fallback to markdown if not JSON
    const html = marked.parse(review);
    resultArea.innerHTML = `<div class="result-content">${html}</div>`;
    return;
  }
}

// Render structured output
resultArea.innerHTML = `
  <div class="result-content">
    <h2>Summary</h2>
    <p>${review.Summary}</p>

    <h2>Strengths</h2>
    <ul>${review.Strengths.map(s => `<li>${s}</li>`).join("")}</ul>

    <h2>Issues</h2>
    <ul>${review.Issues.map(i => `<li>${i}</li>`).join("")}</ul>

    <h2>Suggestions</h2>
    <ul>${review.Suggestions.map(s => `<li>${s}</li>`).join("")}</ul>

    <h2>Score: ${review.Score}/10</h2>
  </div>
`;

      // Apply syntax highlighting to code blocks
      resultArea.querySelectorAll("pre code").forEach(block => {
        hljs.highlightElement(block);
      });

    } catch (err) {
      resultArea.innerHTML = `
        <div class="error-msg">
          ❌ <strong>Error:</strong> ${err.message}<br/><br/>
          Make sure the backend is running at <code>${API_URL}</code>
        </div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "🔍 Review Code";
    }
  }

  function clearAll() {
    document.getElementById("codeInput").value = "";
    document.getElementById("context").value = "";
    document.getElementById("resultArea").innerHTML = `
      <div class="placeholder-msg"><span>🔍</span>Paste your code and click <strong style="color:#a78bfa;">Review Code</strong>.</div>`;
  }

  function loadSample() {
    document.getElementById("language").value = "python";
    document.getElementById("codeInput").value = `import sqlite3

def get_user(username):
    password = "admin123"  # hardcoded secret
    conn = sqlite3.connect("users.db")
    cursor = conn.cursor()
    
    # SQL Injection vulnerability!
    query = f"SELECT * FROM users WHERE username = '{username}'"
    cursor.execute(query)
    result = cursor.fetchall()
    
    x = []
    for i in range(len(result)):
        x.append(result[i])
    
    # No connection close!
    return x

data = get_user(input("Enter username: "))
print(data)`;
    document.getElementById("context").value = "User authentication function";
  }

  // Allow Ctrl+Enter to trigger review
  document.getElementById("codeInput").addEventListener("keydown", e => {
    if (e.ctrlKey && e.key === "Enter") reviewCode();
  });
</script>

</body>
</html>
